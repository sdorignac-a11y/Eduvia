<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduvia | Aula</title>

  <style>
    :root{
      --bg-1:#edf2fb;
      --bg-2:#dfe8f5;

      --card:#f8fbff;
      --card-line:#d8e0eb;

      --wall-1:#f7f3ed;
      --wall-2:#efe8df;
      --floor-1:#c99560;
      --floor-2:#a87547;
      --floor-3:#8a603d;

      --frame:#bb8a59;
      --frame-dark:#95693f;
      --board:#fcfcfb;
      --board-2:#f7f7f5;

      --shadow:0 26px 70px rgba(15,23,42,.12);
      --soft-shadow:0 14px 30px rgba(15,23,42,.08);
      --radius-xl:34px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(109,93,252,.07), transparent 22%),
        radial-gradient(circle at bottom right, rgba(96,165,250,.08), transparent 22%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      font-family:Arial, sans-serif;
    }

    .room-card{
      width:min(1500px, 100%);
      min-height:calc(100vh - 56px);
      background:linear-gradient(180deg, rgba(255,255,255,.72), rgba(248,251,255,.94));
      border:1.5px solid rgba(217,226,237,.95);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
      backdrop-filter:blur(10px);
    }

    .scene{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:
        linear-gradient(180deg, var(--wall-1) 0%, var(--wall-2) 74%, #d7c2aa 74%, #d1b699 100%);
    }

    .scene::before{
      content:"";
      position:absolute;
      left:3%;
      top:0;
      width:30%;
      height:64%;
      background:linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,255,255,0));
      clip-path:polygon(0 0, 58% 0, 100% 100%, 0 100%);
      opacity:.95;
      pointer-events:none;
    }

    .back-wall{
      position:absolute;
      inset:0 0 96px 0;
    }

    .whiteboard-wrap{
      position:absolute;
      left:50%;
      top:11%;
      transform:translateX(-50%);
      width:min(1240px, 86%);
      height:64%;
      min-height:540px;
    }

    .board-pin{
      position:absolute;
      top:-6px;
      width:58px;
      height:12px;
      border-radius:5px;
      background:#2f3138;
      box-shadow:0 2px 4px rgba(0,0,0,.2);
      z-index:3;
    }

    .board-pin.left{ left:18%; }
    .board-pin.right{ right:18%; }

    .whiteboard{
      position:absolute;
      inset:0;
      border:12px solid var(--frame);
      border-bottom-width:14px;
      border-radius:4px;
      background:linear-gradient(180deg, var(--board), var(--board-2));
      box-shadow:
        0 16px 34px rgba(0,0,0,.10),
        inset 0 0 0 1px rgba(255,255,255,.55);
      overflow:hidden;
    }

    .whiteboard::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(115deg, rgba(255,255,255,.72) 7%, rgba(255,255,255,0) 28%),
        radial-gradient(circle at top center, rgba(255,255,255,.38), transparent 46%);
      pointer-events:none;
    }

    .whiteboard::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:14px;
      background:linear-gradient(180deg, var(--frame), var(--frame-dark));
    }

    .board-shadow{
      position:absolute;
      left:50%;
      bottom:-14px;
      transform:translateX(-50%);
      width:90%;
      height:20px;
      border-radius:999px;
      background:rgba(0,0,0,.08);
      filter:blur(10px);
      z-index:0;
    }

    .desk{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:96px;
      background:
        linear-gradient(180deg, var(--floor-1), var(--floor-2) 55%, var(--floor-3) 100%);
      box-shadow:inset 0 8px 14px rgba(255,255,255,.10);
    }

    .desk::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.06), transparent 18%, rgba(0,0,0,.06) 49%, transparent 78%, rgba(255,255,255,.05)),
        linear-gradient(180deg, rgba(255,255,255,.06), transparent 28%);
      pointer-events:none;
    }

    .paper{
      position:absolute;
      bottom:16px;
      width:128px;
      height:82px;
      background:#fffefb;
      border-radius:4px;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .paper.left{
      left:12%;
      transform:rotate(-6deg);
    }

    .paper.right{
      right:12%;
      transform:rotate(4deg);
    }

    .pencil-cup{
      position:absolute;
      bottom:18px;
      right:22%;
      width:38px;
      height:52px;
      border-radius:0 0 10px 10px;
      background:rgba(255,255,255,.86);
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 8px 16px rgba(0,0,0,.08);
    }

    .pencil-cup::before,
    .pencil-cup::after{
      content:"";
      position:absolute;
      bottom:38px;
      width:4px;
      border-radius:999px;
    }

    .pencil-cup::before{
      left:11px;
      height:38px;
      background:#ef4444;
      transform:rotate(-8deg);
    }

    .pencil-cup::after{
      left:21px;
      height:46px;
      background:#22c55e;
      transform:rotate(8deg);
    }

    .pencil{
      position:absolute;
      bottom:28px;
      left:20%;
      width:88px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(90deg,#f59e0b 0 78%, #111827 78% 100%);
      transform:rotate(-20deg);
      box-shadow:0 5px 10px rgba(0,0,0,.08);
    }

    @media (max-width: 1000px){
      body{
        padding:16px;
      }

      .room-card{
        min-height:calc(100vh - 32px);
      }

      .whiteboard-wrap{
        top:12%;
        width:92%;
        height:60%;
        min-height:420px;
      }

      .desk{
        height:82px;
      }

      .paper.right,
      .pencil-cup{
        display:none;
      }
    }

    @media (max-width: 640px){
      .whiteboard-wrap{
        top:13%;
        height:56%;
        min-height:300px;
      }

      .paper.left,
      .pencil{
        display:none;
      }
    }
  </style>
</head>
<body>
  <section class="room-card">
    <div class="scene">
      <div class="back-wall"></div>

      <div class="whiteboard-wrap">
        <div class="board-pin left"></div>
        <div class="board-pin right"></div>
        <div class="board-shadow"></div>

        <div class="whiteboard"></div>
      </div>

      <div class="desk">
        <div class="paper left"></div>
        <div class="paper right"></div>
        <div class="pencil-cup"></div>
        <div class="pencil"></div>
      </div>
    </div>
  </section>
</body>
</html>
