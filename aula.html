<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduvia | Aula</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#f3efe8;
      --card:#f7f3ec;
      --wall-top:#f3efe8;
      --wall-bottom:#cfd7c7;
      --frame:#c9975f;

      --ink:#2f3a44;
      --ink-soft:#536271;
      --muted:#5e6c78;
      --line:rgba(46, 66, 84, .12);

      --green:#2f7d55;
      --blue:#355d95;
      --red:#9b4f5d;
      --yellow-mark:rgba(255, 224, 130, .6);

      --soft:#f6f8fb;
    }

    body{
      min-height:100vh;
      font-family:'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.7), transparent 30%),
        linear-gradient(180deg, #efe9df 0%, #e9e2d8 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      overflow:hidden;
    }

    .scene{
      width:min(1540px, 100%);
      height:min(940px, calc(100vh - 26px));
      background:var(--card);
      border-radius:30px;
      box-shadow:
        0 25px 80px rgba(0,0,0,.10),
        inset 0 1px 0 rgba(255,255,255,.7);
      position:relative;
      overflow:hidden;
    }

    .wall{
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to bottom,
          var(--wall-top) 0%,
          var(--wall-top) 72%,
          var(--wall-bottom) 72%,
          var(--wall-bottom) 100%
        );
    }

    .wall::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.16;
      background-image:
        radial-gradient(rgba(0,0,0,.08) 0.5px, transparent 0.5px);
      background-size:6px 6px;
      mix-blend-mode:multiply;
      pointer-events:none;
    }

    .wall::after{
      content:"";
      position:absolute;
      left:-40px;
      top:50px;
      width:280px;
      height:700px;
      background:
        linear-gradient(
          115deg,
          rgba(0,0,0,.10) 0 12%,
          transparent 12% 25%,
          rgba(0,0,0,.10) 25% 37%,
          transparent 37% 50%,
          rgba(0,0,0,.10) 50% 62%,
          transparent 62% 75%,
          rgba(0,0,0,.10) 75% 87%,
          transparent 87% 100%
        );
      opacity:.23;
      transform:skewY(-8deg);
      pointer-events:none;
      filter:blur(1px);
    }

    .board-wrap{
      position:absolute;
      left:50%;
      top:49.5%;
      transform:translate(-50%, -50%);
      width:min(1320px, 95%);
    }

    .whiteboard{
      position:relative;
      width:100%;
      aspect-ratio:2.2 / 1;
      background:linear-gradient(180deg, #fcfcfc 0%, #f7f7f7 100%);
      border:14px solid var(--frame);
      border-bottom-width:18px;
      border-radius:4px;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.75),
        inset 0 0 26px rgba(0,0,0,.05),
        0 18px 45px rgba(0,0,0,.12);
      overflow:hidden;
    }

    .whiteboard::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(115deg, rgba(255,255,255,.7) 0%, rgba(255,255,255,.08) 28%, transparent 50%);
      pointer-events:none;
    }

    .whiteboard::after{
      content:"";
      position:absolute;
      inset:0;
      box-shadow: inset 0 -12px 24px rgba(0,0,0,.04);
      pointer-events:none;
    }

    .board-clips{
      position:absolute;
      top:-8px;
      left:0;
      width:100%;
      pointer-events:none;
      z-index:3;
    }

    .clip{
      position:absolute;
      width:56px;
      height:24px;
      background:linear-gradient(180deg, #3f454c 0%, #2d3136 100%);
      border-radius:5px;
      box-shadow:0 6px 12px rgba(0,0,0,.18);
    }

    .clip.left{ left:84px; }
    .clip.right{ right:84px; }

    .marker-nav{
      position:absolute;
      top:18px;
      left:28px;
      right:28px;
      display:flex;
      justify-content:center;
      gap:12px;
      z-index:5;
      flex-wrap:wrap;
    }

    .marker-btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:10px 18px 9px;
      border-radius:999px;
      font-family:'Patrick Hand', cursive;
      font-size:1.08rem;
      font-weight:700;
      color:#22303a;
      box-shadow:
        0 8px 18px rgba(0,0,0,.10),
        inset 0 -2px 0 rgba(0,0,0,.08),
        inset 0 1px 0 rgba(255,255,255,.45);
      transition:transform .18s ease, box-shadow .18s ease;
      position:relative;
    }

    .marker-btn:hover{
      transform:translateY(-2px) scale(1.03);
      box-shadow:
        0 12px 20px rgba(0,0,0,.14),
        inset 0 -2px 0 rgba(0,0,0,.08),
        inset 0 1px 0 rgba(255,255,255,.45);
    }

    .marker-btn::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.24), transparent 55%);
      pointer-events:none;
    }

    .marker-btn.green{ background:#b9e7b0; }
    .marker-btn.blue{ background:#b9d9ff; }
    .marker-btn.yellow{ background:#f5e89c; }
    .marker-btn.red{
      background:#f4aaa5;
      color:#5a1f1f;
    }

    .board-content{
      position:absolute;
      inset:82px 22px 28px 18px;
      border-radius:12px;
      z-index:2;
      padding:14px 14px 18px 10px;
      overflow:auto;
      scrollbar-width:thin;
      scrollbar-color:rgba(74,96,118,.35) transparent;
    }

    .board-content::-webkit-scrollbar{
      width:10px;
    }

    .board-content::-webkit-scrollbar-thumb{
      background:rgba(74,96,118,.35);
      border-radius:999px;
    }

    .placeholder-text{
      font-family:'Patrick Hand', cursive;
      font-size:2.2rem;
      color:#40505e;
      opacity:.28;
      user-select:none;
    }

    .board-loading{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Patrick Hand', cursive;
      font-size:2rem;
      color:#4a6276;
      opacity:.78;
      text-align:center;
      position:relative;
      padding:0 24px;
    }

    .board-loading::after{
      content:"";
      position:absolute;
      bottom:38%;
      width:150px;
      height:3px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, rgba(53,93,149,.4), transparent);
      animation:cargaMarker 1.3s linear infinite;
    }

    @keyframes cargaMarker{
      0%{ transform:translateX(-30px); opacity:.35; }
      50%{ transform:translateX(30px); opacity:1; }
      100%{ transform:translateX(-30px); opacity:.35; }
    }

    .board-error{
      max-width:760px;
      padding:20px 22px;
      border-radius:18px;
      background:rgba(244, 170, 165, .18);
      border:1px solid rgba(190, 72, 63, .18);
      color:#6a2d28;
      font-weight:700;
      line-height:1.6;
      font-family:'Patrick Hand', cursive;
      font-size:1.35rem;
      margin:20px auto;
    }

    .board-lesson{
      width:100%;
      max-width:1220px;
      color:var(--ink);
      padding:8px 8px 20px;
      margin:0 auto;
    }

    .board-layout{
      display:grid;
      grid-template-columns:minmax(0, 1.6fr) minmax(290px, .8fr);
      gap:34px;
      align-items:start;
    }

    .board-main{
      position:relative;
      padding-left:34px;
    }

    .board-main::before{
      content:"";
      position:absolute;
      left:8px;
      top:0;
      bottom:0;
      width:2px;
      background:rgba(255, 112, 144, .15);
    }

    .board-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      border-bottom:2px dashed rgba(53,93,149,.18);
      padding-bottom:14px;
      margin-bottom:16px;
    }

    .board-title{
      font-family:'Patrick Hand', cursive;
      font-size:clamp(2.3rem, 4vw, 3.7rem);
      line-height:1.02;
      color:#2d4f76;
      margin:0;
      position:relative;
      display:inline-block;
      text-shadow:.5px .5px 0 rgba(255,255,255,.8);
    }

    .board-title::after{
      content:"";
      position:absolute;
      left:-8px;
      right:-8px;
      bottom:5px;
      height:16px;
      background:var(--yellow-mark);
      border-radius:999px;
      transform:rotate(-1deg);
      z-index:-1;
    }

    .board-badge{
      display:inline-block;
      padding:9px 15px;
      border-radius:999px;
      background:#eef5ff;
      border:1px solid rgba(53,93,149,.12);
      color:#2d4f76;
      font-family:'Patrick Hand', cursive;
      font-weight:700;
      font-size:1.18rem;
      transform:rotate(-1deg);
    }

    .board-summary{
      margin:0 0 18px;
      padding:12px 0 18px;
      border-bottom:2px dashed rgba(53,93,149,.12);
      opacity:0;
      filter:blur(2px);
      transform:translateY(10px);
    }

    .board-section{
      padding:10px 0 18px;
      border-bottom:2px dashed rgba(53,93,149,.12);
      background:none;
      box-shadow:none;
      border-radius:0;
      margin:0;
    }

    .board-section:last-of-type{
      border-bottom:none;
    }

    .board-section h2{
      margin:0 0 10px;
      font-family:'Patrick Hand', cursive;
      font-size:1.75rem;
      font-weight:700;
      color:var(--green);
      letter-spacing:.01em;
      transform:rotate(-.4deg);
      display:inline-block;
    }

    .board-section p{
      margin:0;
      line-height:1.9;
      color:var(--ink);
      font-size:1.28rem;
      font-family:'Patrick Hand', cursive;
      font-weight:700;
    }

    .board-list{
      display:grid;
      gap:12px;
      list-style:none;
      padding:0;
      margin:0;
    }

    .board-list li{
      position:relative;
      padding-left:22px;
      line-height:1.8;
      color:var(--ink);
      font-weight:700;
      font-size:1.2rem;
      font-family:'Patrick Hand', cursive;
    }

    .board-list li::before{
      content:"•";
      position:absolute;
      left:0;
      top:0;
      color:var(--blue);
      font-weight:900;
    }

    .board-highlight{
      background:linear-gradient(180deg, transparent 40%, rgba(255, 227, 122, .9) 40%);
      color:inherit;
      padding:0 .12em;
      border-radius:6px;
    }

    .type-target{
      white-space:pre-wrap;
    }

    .board-side{
      display:flex;
      flex-direction:column;
      gap:18px;
      padding-top:8px;
    }

    .visual-box{
      background:rgba(255,255,255,.76);
      border:1px solid rgba(53,93,149,.10);
      border-radius:24px;
      padding:12px;
      box-shadow:0 14px 28px rgba(0,0,0,.06);
      opacity:0;
      filter:blur(2px);
      transform:translateY(10px);
      transform-origin:center;
    }

    .visual-box:nth-child(1){
      transform:translateY(10px) rotate(1.2deg);
    }

    .visual-box:nth-child(2){
      transform:translateY(10px) rotate(-1.4deg);
    }

    .visual-box:nth-child(3){
      transform:translateY(10px) rotate(.8deg);
    }

    .visual-box.visual-blue{
      background:linear-gradient(180deg, #f4f8ff 0%, #edf4ff 100%);
    }

    .visual-box.visual-green{
      background:linear-gradient(180deg, #f3fbf6 0%, #ebf8ef 100%);
    }

    .visual-box.visual-yellow{
      background:linear-gradient(180deg, #fffdf2 0%, #fff9e7 100%);
    }

    .visual-box.visual-red{
      background:linear-gradient(180deg, #fff5f7 0%, #fff0f3 100%);
    }

    .visual-img{
      width:100%;
      aspect-ratio:4 / 3;
      object-fit:cover;
      border-radius:18px;
      display:block;
      background:#f3f6fb;
      border:1px solid rgba(53,93,149,.08);
    }

    .visual-caption{
      margin-top:10px;
      font-family:'Patrick Hand', cursive;
      font-size:1.08rem;
      color:#355d95;
      font-weight:700;
      text-align:center;
      line-height:1.35;
    }

    .inline-visual{
      margin:18px 0 22px;
      padding:14px;
      border-radius:24px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(53,93,149,.10);
      box-shadow:0 12px 28px rgba(0,0,0,.05);
      opacity:0;
      filter:blur(2px);
      transform:translateY(10px);
    }

    .inline-blue{
      background:linear-gradient(180deg, #f4f8ff 0%, #edf4ff 100%);
    }

    .inline-green{
      background:linear-gradient(180deg, #f3fbf6 0%, #ebf8ef 100%);
    }

    .inline-yellow{
      background:linear-gradient(180deg, #fffdf2 0%, #fff9e7 100%);
    }

    .inline-red{
      background:linear-gradient(180deg, #fff5f7 0%, #fff0f3 100%);
    }

    .inline-visual-img{
      width:100%;
      aspect-ratio:16 / 7;
      object-fit:cover;
      display:block;
      border-radius:18px;
      background:#f3f6fb;
      border:1px solid rgba(53,93,149,.08);
    }

    .inline-visual-caption{
      margin-top:10px;
      text-align:center;
      color:#4d6277;
      font-family:'Patrick Hand', cursive;
      font-size:1.08rem;
      font-weight:700;
      line-height:1.35;
    }

    .tray{
      position:absolute;
      left:18px;
      bottom:10px;
      display:flex;
      gap:8px;
      align-items:center;
      z-index:4;
    }

    .marker{
      width:32px;
      height:7px;
      border-radius:999px;
      box-shadow:0 2px 5px rgba(0,0,0,.12);
    }

    .marker.green{ background:#5ca46c; }
    .marker.blue{ background:#355d95; }
    .marker.white{ background:#ececec; border:1px solid rgba(0,0,0,.08); }
    .marker.red{ background:#d9534f; }
    .marker.black{ background:#26313a; }

    .board-title,
    .board-badge,
    .board-section,
    .board-list li,
    .visual-box{
      opacity:0;
      filter:blur(2px);
      transform:translateY(10px);
    }

    .is-visible{
      opacity:1 !important;
      filter:blur(0) !important;
      transform:translateY(0) !important;
      transition:
        opacity .45s ease,
        transform .45s ease,
        filter .45s ease;
    }

    .is-typing{
      border-right:3px solid rgba(47, 53, 66, .45);
      animation:blinkCursor .7s step-end infinite;
    }

    @keyframes blinkCursor{
      50%{
        border-color:transparent;
      }
    }

    .chat-panel,
    .sources-panel{
      position:absolute;
      bottom:26px;
      width:min(360px, calc(100% - 36px));
      background:rgba(255,255,255,.96);
      border:1px solid rgba(53,93,149,.14);
      border-radius:22px;
      box-shadow:0 18px 40px rgba(0,0,0,.14);
      z-index:8;
      padding:16px;
      display:none;
      backdrop-filter:blur(10px);
    }

    .chat-panel{
      right:18px;
    }

    .sources-panel{
      left:18px;
      width:min(390px, calc(100% - 36px));
    }

    .chat-panel.is-open,
    .sources-panel.is-open{
      display:block;
      animation:chatFadeIn .22s ease;
    }

    @keyframes chatFadeIn{
      from{
        opacity:0;
        transform:translateY(10px) scale(.98);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .chat-panel-header,
    .sources-panel-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .chat-panel-header h3,
    .sources-panel-header h3{
      margin:0;
      font-size:1.08rem;
      color:#2d4f76;
      font-weight:800;
    }

    .chat-panel-header p,
    .sources-panel-header p{
      margin:4px 0 0;
      font-size:.9rem;
      line-height:1.4;
      color:#5e6c78;
    }

    .chat-close,
    .sources-close{
      border:none;
      background:#eef5ff;
      color:#2d4f76;
      width:34px;
      height:34px;
      border-radius:10px;
      cursor:pointer;
      font-size:1.2rem;
      font-weight:800;
    }

    .chat-form{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .chat-input{
      width:100%;
      resize:none;
      border:none;
      outline:none;
      border-radius:16px;
      background:#f7fbff;
      padding:14px;
      font-family:'Inter', sans-serif;
      font-size:.96rem;
      color:#2f3a44;
      border:1px solid rgba(53,93,149,.10);
    }

    .chat-input:focus{
      border-color:rgba(53,93,149,.28);
      box-shadow:0 0 0 4px rgba(53,93,149,.08);
    }

    .chat-actions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .chat-hint{
      font-size:.84rem;
      color:#5e6c78;
    }

    .chat-send-btn{
      border:none;
      cursor:pointer;
      padding:10px 14px;
      border-radius:999px;
      background:#b9d9ff;
      color:#1f3f69;
      font-weight:800;
      box-shadow:
        0 8px 18px rgba(0,0,0,.10),
        inset 0 -2px 0 rgba(0,0,0,.08),
        inset 0 1px 0 rgba(255,255,255,.45);
    }

    .chat-send-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .sources-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:290px;
      overflow:auto;
      padding-right:4px;
      scrollbar-width:thin;
      scrollbar-color:rgba(74,96,118,.35) transparent;
    }

    .sources-list::-webkit-scrollbar{
      width:8px;
    }

    .sources-list::-webkit-scrollbar-thumb{
      background:rgba(74,96,118,.35);
      border-radius:999px;
    }

    .source-empty{
      padding:14px;
      border-radius:16px;
      background:#f7fbff;
      border:1px dashed rgba(53,93,149,.18);
      color:#5e6c78;
      font-size:.92rem;
      line-height:1.5;
    }

    .source-item{
      padding:12px 14px;
      border-radius:16px;
      background:#f7fbff;
      border:1px solid rgba(53,93,149,.10);
    }

    .source-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .source-title{
      font-size:.95rem;
      line-height:1.4;
      color:#2d4f76;
      font-weight:800;
    }

    .source-pill{
      flex-shrink:0;
      padding:5px 10px;
      border-radius:999px;
      background:#eef5ff;
      border:1px solid rgba(53,93,149,.10);
      color:#355d95;
      font-size:.76rem;
      font-weight:800;
    }

    .source-url{
      display:block;
      font-size:.84rem;
      line-height:1.45;
      color:#5e6c78;
      text-decoration:none;
      word-break:break-word;
    }

    .source-url:hover{
      text-decoration:underline;
    }

    @media (max-width: 980px){
      .board-layout{
        grid-template-columns:1fr;
      }

      .board-side{
        order:-1;
        display:grid;
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px){
      .scene{
        border-radius:22px;
        height:min(760px, calc(100vh - 24px));
      }

      .board-wrap{
        width:94%;
        top:47%;
      }

      .clip{
        width:42px;
        height:20px;
      }

      .clip.left{ left:40px; }
      .clip.right{ right:40px; }

      .board-title{
        font-size:2.2rem;
      }
    }

    @media (max-width: 640px){
      body{
        padding:12px;
      }

      .scene{
        height:min(560px, calc(100vh - 24px));
        border-radius:18px;
      }

      .board-wrap{
        width:94%;
        top:45%;
      }

      .whiteboard{
        border-width:10px;
        border-bottom-width:14px;
      }

      .marker-nav{
        top:14px;
        left:14px;
        right:14px;
        gap:8px;
      }

      .marker-btn{
        padding:8px 14px 7px;
        font-size:.96rem;
      }

      .board-content{
        inset:78px 16px 24px 16px;
      }

      .placeholder-text{
        font-size:1.55rem;
      }

      .board-loading{
        font-size:1.55rem;
      }

      .board-main{
        padding-left:18px;
      }

      .board-main::before{
        left:2px;
      }

      .board-side{
        grid-template-columns:1fr;
      }

      .board-title{
        font-size:2.45rem;
      }

      .board-badge{
        font-size:1.05rem;
      }

      .board-section h2{
        font-size:1.45rem;
      }

      .board-section p,
      .board-list li{
        font-size:1.1rem;
      }

      .visual-caption,
      .inline-visual-caption{
        font-size:1rem;
      }

      .tray{
        left:12px;
        bottom:8px;
        gap:6px;
      }

      .marker{
        width:24px;
        height:6px;
      }

      .clip.left{ left:22px; }
      .clip.right{ right:22px; }

      .chat-panel,
      .sources-panel{
        right:12px;
        left:12px;
        bottom:18px;
        width:auto;
        border-radius:18px;
      }
    }
  </style>
</head>
<body>
  <main class="scene">
    <div class="wall"></div>

    <section class="board-wrap">
      <div class="whiteboard">
        <div class="board-clips">
          <span class="clip left"></span>
          <span class="clip right"></span>
        </div>

        <div class="marker-nav">
          <button class="marker-btn green" type="button" onclick="location.href='panel.html'">Inicio</button>
          <button class="marker-btn blue" type="button" onclick="location.href='materiales.html'">Material</button>
          <button class="marker-btn blue" type="button" id="toggle-sources-btn">Fuentes</button>
          <button class="marker-btn yellow" type="button" id="toggle-chat-btn">Chat</button>
          <button class="marker-btn green" type="button" id="save-summary-btn">Guardar resumen</button>
          <button class="marker-btn red" type="button" onclick="location.href='panel.html'">Abandonar sala</button>
        </div>

        <div class="board-content" id="board-content">
          <div class="placeholder-text">Tu clase se mostrará acá</div>
        </div>

        <aside class="sources-panel" id="sources-panel" aria-hidden="true">
          <div class="sources-panel-header">
            <div>
              <h3>Fuentes consultadas</h3>
              <p>Estas páginas se usaron como base para armar la clase</p>
            </div>
            <button type="button" class="sources-close" id="sources-close-btn">×</button>
          </div>

          <div class="sources-list" id="sources-list">
            <div class="source-empty">
              Todavía no hay fuentes cargadas para esta clase.
            </div>
          </div>
        </aside>

        <aside class="chat-panel" id="chat-panel" aria-hidden="true">
          <div class="chat-panel-header">
            <div>
              <h3>Preguntarle a la IA</h3>
              <p>Escribí tu duda y la respuesta aparecerá en el pizarrón</p>
            </div>
            <button type="button" class="chat-close" id="chat-close-btn">×</button>
          </div>

          <form class="chat-form" id="chat-form">
            <textarea
              id="chat-input"
              class="chat-input"
              placeholder="Ej: No entendí qué son las fracciones equivalentes"
              rows="4"
              maxlength="500"
            ></textarea>

            <div class="chat-actions">
              <span class="chat-hint" id="chat-status">Listo para preguntar</span>
              <button type="submit" class="chat-send-btn" id="chat-send-btn">
                Preguntar
              </button>
            </div>
          </form>
        </aside>

        <div class="tray">
          <span class="marker green"></span>
          <span class="marker blue"></span>
          <span class="marker white"></span>
          <span class="marker red"></span>
          <span class="marker black"></span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const boardEl = document.getElementById("board-content");

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function mostrarErrorPantalla(mensaje) {
      if (!boardEl) return;
      boardEl.innerHTML = `
        <div class="board-error">
          ${escapeHtml(mensaje)}
        </div>
      `;
    }

    window.addEventListener("error", (e) => {
      console.error("Error global:", e.error || e.message);
      mostrarErrorPantalla("Hubo un error cargando el aula. Revisá la consola del navegador.");
    });

    window.addEventListener("unhandledrejection", (e) => {
      console.error("Promesa no manejada:", e.reason);
      mostrarErrorPantalla("Hubo un problema cargando la clase. Revisá la consola del navegador.");
    });
  </script>

  <script type="module" src="aula.js"></script>
  <script type="module" src="panel-auth.js?v=1"></script>
</body>
</html>
