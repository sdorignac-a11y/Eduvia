<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduvia | Aula</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#f3efe8;
      --card:#f7f3ec;
      --wall-top:#f3efe8;
      --wall-bottom:#cfd7c7;
      --frame:#c9975f;
      --frame-dark:#9d7446;
      --board:#f8f8f8;
      --clip:#2f3338;
      --shadow:0 30px 80px rgba(60, 45, 25, 0.14);
    }

    body{
      min-height:100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent 30%),
        linear-gradient(180deg, #efe9df 0%, #e9e2d8 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      overflow:hidden;
    }

    .scene{
      width:min(1400px, 100%);
      height:min(860px, calc(100vh - 44px));
      background:var(--card);
      border-radius:30px;
      box-shadow:
        0 25px 80px rgba(0,0,0,0.10),
        inset 0 1px 0 rgba(255,255,255,0.7);
      position:relative;
      overflow:hidden;
    }

    .wall{
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to bottom,
          var(--wall-top) 0%,
          var(--wall-top) 72%,
          var(--wall-bottom) 72%,
          var(--wall-bottom) 100%
        );
    }

    /* textura sutil de pared */
    .wall::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.18;
      background-image:
        radial-gradient(rgba(0,0,0,.08) 0.5px, transparent 0.5px);
      background-size:6px 6px;
      mix-blend-mode:multiply;
      pointer-events:none;
    }

    /* sombra de ventana */
    .wall::after{
      content:"";
      position:absolute;
      left:-40px;
      top:50px;
      width:280px;
      height:700px;
      background:
        linear-gradient(
          115deg,
          rgba(0,0,0,0.10) 0 12%,
          transparent 12% 25%,
          rgba(0,0,0,0.10) 25% 37%,
          transparent 37% 50%,
          rgba(0,0,0,0.10) 50% 62%,
          transparent 62% 75%,
          rgba(0,0,0,0.10) 75% 87%,
          transparent 87% 100%
        );
      filter:blur(1px);
      opacity:.23;
      transform:skewY(-8deg);
      pointer-events:none;
    }

    .board-wrap{
      position:absolute;
      left:50%;
      top:49%;
      transform:translate(-50%, -50%);
      width:min(1180px, 90%);
    }

    .whiteboard{
      position:relative;
      width:100%;
      aspect-ratio:2.35 / 1;
      background:
        linear-gradient(180deg, #fcfcfc 0%, #f7f7f7 100%);
      border:14px solid var(--frame);
      border-bottom-width:18px;
      border-radius:4px;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.75),
        inset 0 0 26px rgba(0,0,0,0.05),
        0 18px 45px rgba(0,0,0,0.12);
      overflow:hidden;
    }

    .whiteboard::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.08) 28%, transparent 50%);
      pointer-events:none;
    }

    .whiteboard::after{
      content:"";
      position:absolute;
      inset:0;
      box-shadow: inset 0 -12px 24px rgba(0,0,0,0.04);
      pointer-events:none;
    }

    .board-clips{
      position:absolute;
      top:-8px;
      left:0;
      width:100%;
      pointer-events:none;
    }

    .clip{
      position:absolute;
      width:56px;
      height:24px;
      background:linear-gradient(180deg, #3f454c 0%, #2d3136 100%);
      border-radius:5px;
      box-shadow:0 6px 12px rgba(0,0,0,0.18);
    }

    .clip.left{
      left:84px;
    }

    .clip.right{
      right:84px;
    }

    .tray{
      position:absolute;
      left:18px;
      bottom:10px;
      display:flex;
      gap:8px;
      align-items:center;
    }

    .marker{
      width:32px;
      height:7px;
      border-radius:999px;
      box-shadow:0 2px 5px rgba(0,0,0,0.12);
    }

    .marker.green{ background:#5ca46c; }
    .marker.blue{ background:#355d95; }
    .marker.white{ background:#ececec; border:1px solid rgba(0,0,0,0.08); }
    .marker.red{ background:#d9534f; }
    .marker.black{ background:#26313a; }

    /* zona vacía para el contenido de la clase */
    .board-content{
      position:absolute;
      inset:26px 28px 32px 28px;
      border-radius:6px;
    }

    @media (max-width: 900px){
      .scene{
        border-radius:22px;
        height:min(700px, calc(100vh - 24px));
      }

      .board-wrap{
        width:92%;
        top:47%;
      }

      .clip{
        width:42px;
        height:20px;
      }

      .clip.left{ left:40px; }
      .clip.right{ right:40px; }
    }

    @media (max-width: 640px){
      body{
        padding:12px;
      }

      .scene{
        height:min(560px, calc(100vh - 24px));
        border-radius:18px;
      }

      .board-wrap{
        width:94%;
        top:45%;
      }

      .whiteboard{
        border-width:10px;
        border-bottom-width:14px;
      }

      .tray{
        left:12px;
        bottom:8px;
        gap:6px;
      }

      .marker{
        width:24px;
        height:6px;
      }

      .clip.left{ left:22px; }
      .clip.right{ right:22px; }
    }
  </style>
</head>
<body>
  <main class="scene">
    <div class="wall"></div>

    <section class="board-wrap">
      <div class="whiteboard">
        <div class="board-clips">
          <span class="clip left"></span>
          <span class="clip right"></span>
        </div>

        <div class="board-content" id="board-content"></div>

        <div class="tray">
          <span class="marker green"></span>
          <span class="marker blue"></span>
          <span class="marker white"></span>
          <span class="marker red"></span>
          <span class="marker black"></span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
